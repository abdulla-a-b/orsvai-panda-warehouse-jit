name: ORSVAI analytics

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC ≈ 08:00 Dhaka, daily
  workflow_dispatch: {}    # allow manual runs

permissions:
  contents: write

jobs:
  build-analytics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run ORSVAI analytics
        env:
          ORSVAI_SCRIPT_URL: ${{ secrets.ORSVAI_SCRIPT_URL }}
        run: python analytics.py

      - name: Commit refreshed analytics
        run: |
          git config user.name  "orsvai-bot"
          git config user.email "actions@github.com"
          git add data/analytics.json data/tasks.json data/snapshots.json || true
          git diff --staged --quiet || git commit -m "chore: refresh ORSVAI analytics [skip ci]"
          git push
